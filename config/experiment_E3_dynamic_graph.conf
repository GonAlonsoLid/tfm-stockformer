# E3: Dynamic graph — ranking_combined loss, Alpha360 only, learned graph

[DEFAULT]
date_range = 2018-01-01_2026-03-16

[file]
data_dir = ./data/Stock_SP500_%(date_range)s
traffic = %(data_dir)s/flow.npz
indicator = %(data_dir)s/trend_indicator.npz
adj = %(data_dir)s/corr_adj.npy
adjgat = %(data_dir)s/128_corr_struc2vec_adjgat.npy
alpha_360_dir = %(data_dir)s/features
model = ./cpt/STOCK/ablation_E3_dynamic_graph
log = ./log/STOCK/ablation_E3_dynamic_graph
output_dir = ./output/ablation_E3_dynamic_graph
tensorboard_dir = ./runs/ablation/E3_dynamic_graph

[data]
dataset = STOCK
T1 = 20
T2 = 2
train_ratio = 0.75
val_ratio = 0.125
test_ratio = 0.125

[train]
cuda = 0
max_epoch = 50
batch_size = 12
learning_rate = 0.001
seed = 1

[loss]
type = ranking_combined
listnet_weight = 0.5
ic_weight = 0.3
mae_weight = 0.2
class_weight = 0.5

[regularization]
dropout = 0.2
noise_std = 0.01
weight_decay = 1e-5
grad_clip = 0.3
early_stopping_patience = 15

[param]
layers = 2
heads = 1
dims = 128
samples = 1
wave = sym2
level = 1
max_features = 360
decomposition = dwt
stl_period = 5
graph_type = learned
