# Stockformer training configuration — S&P500 data (2018-2024)
#
# Purpose:
#   Wires Phase 2 S&P500 pipeline outputs to MultiTask_Stockformer_train.py.
#   This file is the central configuration for the S&P500 model run.
#
# Key notes:
#   - alpha_360_dir points to Alpha360 feature CSVs (360 features, Phase 8).
#     StockDataset computes infea = len(os.listdir(alpha_360_dir)) + 2
#     dynamically at load time — no manual infea editing required.
#     With 360 feature CSVs: infea = 362.
#   - alpha_360_dir must point to the features/ SUBDIRECTORY, not the parent
#     data directory. StockDataset calls os.listdir() and reads every file as
#     a CSV; pointing to the parent causes parse errors on .npz/.npy files.
#   - cuda=0 targets the first NVIDIA GPU if available; falls back to CPU on
#     machines without an NVIDIA GPU (pytorch selects automatically).
#   - max_epoch=50 (down from 100 in CN config) to reduce training time.
#     Override at runtime: python MultiTask_Stockformer_train.py \
#       --config config/Multitask_Stock_SP500.conf --max_epoch 100
#   - For a quick smoke test: add --max_epoch 2 to the command above.
#
# Run with:
#   python MultiTask_Stockformer_train.py --config config/Multitask_Stock_SP500.conf
# Smoke test:
#   python MultiTask_Stockformer_train.py --config config/Multitask_Stock_SP500.conf --max_epoch 2

[file]
traffic = ./data/Stock_SP500_2018-01-01_2024-01-01/flow.npz
indicator = ./data/Stock_SP500_2018-01-01_2024-01-01/trend_indicator.npz
adj = ./data/Stock_SP500_2018-01-01_2024-01-01/corr_adj.npy
adjgat = ./data/Stock_SP500_2018-01-01_2024-01-01/128_corr_struc2vec_adjgat.npy
model = ./cpt/STOCK/saved_model_Multitask_SP500_2018-2024
log = ./log/STOCK/log_Multitask_SP500_2018-2024
alpha_360_dir = ./data/Stock_SP500_2018-01-01_2024-01-01/features
output_dir = ./output/Multitask_output_SP500_2018-2024
tensorboard_dir = ./runs/Multitask_Stockformer/Stock_SP500_2018-01-01_2024-01-01

[data]
dataset = STOCK
T1 = 20
T2 = 2
train_ratio = 0.75
val_ratio = 0.125
test_ratio = 0.125

[train]
cuda = 0
max_epoch = 50
batch_size = 12
learning_rate = 0.001
seed = 1

[param]
layers = 2
heads = 1
dims = 128
samples = 1
wave = sym2
level = 1
